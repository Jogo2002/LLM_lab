name: Flake8

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Run flake8
      run: |
        flake8 chat.py tools/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 chat.py tools/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics