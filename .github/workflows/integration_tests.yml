name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Check submodules
      run: |
        ls -la test_projects/
        test -d test_projects/webpage || exit 1
        test -d test_projects/markdown_compiler || exit 1
        test -d test_projects/ebay_scraper || exit 1
    - name: Run integration test for webpage
      run: |
        cd test_projects/webpage
        python -c "print('Webpage submodule present')"
    - name: Run integration test for markdown_compiler
      run: |
        cd test_projects/markdown_compiler
        python -c "print('Markdown compiler submodule present')"
    - name: Run integration test for ebay_scraper
      run: |
        cd test_projects/ebay_scraper
        python -c "print('Ebay scraper submodule present')"