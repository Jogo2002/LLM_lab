name: Doctests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run doctests
      run: |
        python -m doctest chat.py tools/*.py
    - name: Run coverage
      run: |
        pip install coverage
        python -m coverage run -m doctest chat.py tools/cat.py tools/calculate.py tools/grep.py tools/ls.py
        python -m coverage report --fail-under=90